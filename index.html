<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Animated Web App</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #f6f8fb 0%, #e5eef9 100%); /* Soft background to make glass pop */
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BUBBLE MENU CSS - UPDATED FOR GLASSMORPHISM */
    .bubble-menu {
      left: 0;
      right: 0;
      top: 2em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 2em;
      pointer-events: none;
      z-index: 99;
    }
    .bubble-menu.fixed { position: fixed; }
    .bubble-menu.absolute { position: absolute; }
    .bubble-menu .bubble {
      --bubble-size: 48px;
      width: var(--bubble-size);
      height: var(--bubble-size);
      border-radius: 50%;
      /* Glassmorphism core CSS */
      background: rgba(255, 255, 255, 0.6) !important; 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      /* --------------------- */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      transition: box-shadow 0.3s ease;
    }
    .bubble-menu .bubble:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }
    .bubble-menu .logo-bubble, .bubble-menu .toggle-bubble { will-change: transform; }
    .bubble-menu .logo-bubble {
      width: auto;
      min-height: var(--bubble-size);
      height: var(--bubble-size);
      padding: 0 20px;
      border-radius: calc(var(--bubble-size) / 2);
      gap: 8px;
    }
    .bubble-menu .toggle-bubble { width: var(--bubble-size); height: var(--bubble-size); }
    .bubble-menu .bubble-logo { max-height: 60%; max-width: 100%; object-fit: contain; display: block; }
    .bubble-menu .logo-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    .bubble-menu .menu-btn {
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .bubble-menu .menu-line {
      width: 26px;
      height: 2px;
      background: #111;
      border-radius: 2px;
      display: block;
      margin: 0 auto;
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform-origin: center;
    }
    .bubble-menu .menu-line + .menu-line { margin-top: 6px; }
    .bubble-menu .menu-btn.open .menu-line:first-child { transform: translateY(4px) rotate(45deg); }
    .bubble-menu .menu-btn.open .menu-line:last-child { transform: translateY(-4px) rotate(-45deg); }
    
    @media (min-width: 768px) {
      .bubble-menu .bubble { --bubble-size: 56px; }
      .bubble-menu .logo-bubble { padding: 0 24px; }
    }

    /* FULLSCREEN MENU ITEMS */
    .bubble-menu-items {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 98;
    }
    .bubble-menu-items.fixed { position: fixed; }
    .bubble-menu-items.absolute { position: absolute; }
    .bubble-menu-items .pill-list {
      list-style: none;
      margin: 0;
      padding: 0 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      row-gap: 4px;
      width: 100%;
      max-width: 1600px;
      margin-left: auto;
      margin-right: auto;
      pointer-events: auto;
      justify-content: stretch;
    }
    .bubble-menu-items .pill-list .pill-col {
      display: flex;
      justify-content: center;
      align-items: stretch;
      flex: 0 0 calc(100% / 3);
      box-sizing: border-box;
    }
    .bubble-menu-items .pill-list .pill-col:nth-child(4):nth-last-child(2) { margin-left: calc(100% / 6); }
    .bubble-menu-items .pill-list .pill-col:nth-child(4):last-child { margin-left: calc(100% / 3); }
    
    .bubble-menu-items .pill-link {
      --pill-bg: rgba(255, 255, 255, 0.8);
      --pill-color: #111;
      --item-rot: 0deg;
      --pill-min-h: 160px;
      --hover-bg: #f3f4f6;
      --hover-color: #111;
      width: 100%;
      min-height: var(--pill-min-h);
      padding: clamp(1.5rem, 3vw, 8rem) 0;
      font-size: clamp(1.5rem, 4vw, 4rem);
      font-weight: 500;
      border-radius: 999px;
      background: var(--pill-bg);
      color: var(--pill-color);
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.3s ease, color 0.3s ease;
      will-change: transform;
      box-sizing: border-box;
      white-space: nowrap;
    }
    @media (min-width: 900px) {
      .bubble-menu-items .pill-link { transform: rotate(var(--item-rot)); }
      .bubble-menu-items .pill-link:hover {
        transform: rotate(var(--item-rot)) scale(1.06);
        background: var(--hover-bg) !important;
        color: var(--hover-color);
        border: none;
      }
    }
    .bubble-menu-items .pill-link .pill-label { display: inline-block; will-change: transform, opacity; line-height: 1.2; }
    
    @media (max-width: 899px) {
      .bubble-menu-items { padding-top: 120px; align-items: flex-start; }
      .bubble-menu-items .pill-list { row-gap: 16px; }
      .bubble-menu-items .pill-list .pill-col { flex: 0 0 100%; margin-left: 0 !important; }
      .bubble-menu-items .pill-link { font-size: clamp(1.2rem, 3vw, 4rem); padding: clamp(1rem, 2vw, 2rem) 0; min-height: 80px; }
      .bubble-menu-items .pill-link:hover { transform: scale(1.04); background: var(--hover-bg) !important; color: var(--hover-color); }
    }

    /* --- NEW ADDITIONS FOR PREMIUM FEEL --- */

    /* 1. Gradient Text */
    .gradient-text {
      background: linear-gradient(90deg, #4f46e5, #ec4899, #f59e0b);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientFlow 5s ease infinite;
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 10px;
    }
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 2. Floating Animation */
    .floating-element {
      font-size: 4rem;
      margin: 20px auto;
      animation: floatItem 4s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes floatItem {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    /* 3. Content Cards */
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      max-width: 1000px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      padding: 30px;
      text-align: left;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      background: #ffffff;
    }
    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 15px;
    }
    .card h3 {
      margin: 0 0 10px 0;
      color: #1f2937;
      font-size: 1.5rem;
    }
    .card p {
      margin: 0;
      color: #6b7280;
      line-height: 1.6;
    }

    .hero-section {
      padding: 150px 20px 50px;
      text-align: center;
    }
    .hero-subtitle {
      color: #4b5563;
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto;
    }

  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const DEFAULT_ITEMS = [
      { label: 'home', href: '#', ariaLabel: 'Home', rotation: -8, hoverStyles: { bgColor: '#3b82f6', textColor: '#ffffff' } },
      { label: 'about', href: '#', ariaLabel: 'About', rotation: 8, hoverStyles: { bgColor: '#10b981', textColor: '#ffffff' } },
      { label: 'projects', href: '#', ariaLabel: 'Documentation', rotation: 8, hoverStyles: { bgColor: '#f59e0b', textColor: '#ffffff' } },
      { label: 'blog', href: '#', ariaLabel: 'Blog', rotation: 8, hoverStyles: { bgColor: '#ef4444', textColor: '#ffffff' } },
      { label: 'contact', href: '#', ariaLabel: 'Contact', rotation: -8, hoverStyles: { bgColor: '#8b5cf6', textColor: '#ffffff' } }
    ];

    function BubbleMenu({
      logo, onMenuClick, className, style,
      menuAriaLabel = 'Toggle menu', menuContentColor = '#111',
      useFixedPosition = false, items, animationEase = 'back.out(1.5)',
      animationDuration = 0.5, staggerDelay = 0.12
    }) {
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [showOverlay, setShowOverlay] = useState(false);

      const overlayRef = useRef(null);
      const bubblesRef = useRef([]);
      const labelRefs = useRef([]);

      const menuItems = items?.length ? items : DEFAULT_ITEMS;
      const containerClassName = ['bubble-menu', useFixedPosition ? 'fixed' : 'absolute', className].filter(Boolean).join(' ');

      const handleToggle = () => {
        const nextState = !isMenuOpen;
        if (nextState) setShowOverlay(true);
        setIsMenuOpen(nextState);
        onMenuClick?.(nextState);
      };

      useEffect(() => {
        const overlay = overlayRef.current;
        const bubbles = bubblesRef.current.filter(Boolean);
        const labels = labelRefs.current.filter(Boolean);

        if (!overlay || !bubbles.length) return;

        if (isMenuOpen) {
          gsap.set(overlay, { display: 'flex' });
          gsap.killTweensOf([...bubbles, ...labels]);
          gsap.set(bubbles, { scale: 0, transformOrigin: '50% 50%' });
          gsap.set(labels, { y: 24, autoAlpha: 0 });

          bubbles.forEach((bubble, i) => {
            const delay = i * staggerDelay + gsap.utils.random(-0.05, 0.05);
            const tl = gsap.timeline({ delay });

            tl.to(bubble, { scale: 1, duration: animationDuration, ease: animationEase });
            if (labels[i]) {
              tl.to(labels[i], { y: 0, autoAlpha: 1, duration: animationDuration, ease: 'power3.out' }, `-=${animationDuration * 0.9}`);
            }
          });
        } else if (showOverlay) {
          gsap.killTweensOf([...bubbles, ...labels]);
          gsap.to(labels, { y: 24, autoAlpha: 0, duration: 0.2, ease: 'power3.in' });
          gsap.to(bubbles, {
            scale: 0, duration: 0.2, ease: 'power3.in',
            onComplete: () => {
              gsap.set(overlay, { display: 'none' });
              setShowOverlay(false);
            }
          });
        }
      }, [isMenuOpen, showOverlay, animationEase, animationDuration, staggerDelay]);

      useEffect(() => {
        const handleResize = () => {
          if (isMenuOpen) {
            const bubbles = bubblesRef.current.filter(Boolean);
            const isDesktop = window.innerWidth >= 900;
            bubbles.forEach((bubble, i) => {
              const item = menuItems[i];
              if (bubble && item) {
                const rotation = isDesktop ? (item.rotation ?? 0) : 0;
                gsap.set(bubble, { rotation });
              }
            });
          }
        };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [isMenuOpen, menuItems]);

      return (
        <React.Fragment>
          <nav className={containerClassName} style={style} aria-label="Main navigation">
            <div className="bubble logo-bubble" aria-label="Logo">
              <span className="logo-content">
                {typeof logo === 'string' ? <img src={logo} alt="Logo" className="bubble-logo" /> : logo}
              </span>
            </div>

            <button
              type="button"
              className={`bubble toggle-bubble menu-btn ${isMenuOpen ? 'open' : ''}`}
              onClick={handleToggle}
              aria-label={menuAriaLabel}
              aria-pressed={isMenuOpen}
            >
              <span className="menu-line" style={{ background: menuContentColor }} />
              <span className="menu-line short" style={{ background: menuContentColor }} />
            </button>
          </nav>
          
          {showOverlay && (
            <div ref={overlayRef} className={`bubble-menu-items ${useFixedPosition ? 'fixed' : 'absolute'}`} aria-hidden={!isMenuOpen}>
              <ul className="pill-list" role="menu" aria-label="Menu links">
                {menuItems.map((item, idx) => (
                  <li key={idx} role="none" className="pill-col">
                    <a
                      role="menuitem" href={item.href} aria-label={item.ariaLabel || item.label} className="pill-link"
                      style={{
                        '--item-rot': `${item.rotation ?? 0}deg`,
                        '--pill-color': menuContentColor,
                        '--hover-bg': item.hoverStyles?.bgColor || '#f3f4f6', 
                        '--hover-color': item.hoverStyles?.textColor || menuContentColor
                      }}
                      ref={el => { if (el) bubblesRef.current[idx] = el; }}
                    >
                      <span className="pill-label" ref={el => { if (el) labelRefs.current[idx] = el; }}>{item.label}</span>
                    </a>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </React.Fragment>
      );
    }

    // Main App Component
    function App() {
      return (
        <div>
          <BubbleMenu
            logo={<span style={{ fontWeight: 800, fontSize: '24px', letterSpacing: '-0.5px' }}>flash ftx</span>}
            useFixedPosition={true}
          />
          
          <div className="hero-section">
            <div className="floating-element">🚀</div>
            <h1 className="gradient-text">Welcome to the Future!</h1>
            <p className="hero-subtitle">Scroll Thazhekk cheythalum menu nilkum. Click the glass menu icon on the top right to see the magic animation.</p>
          </div>

          <div className="card-container">
            <div className="card">
              <div className="card-icon">💻</div>
              <h3>Frontend Magic</h3>
              <p>Experience smooth GSAP animations and React components working together beautifully.</p>
            </div>
            
            <div className="card">
              <div className="card-icon">✨</div>
              <h3>Glassmorphism UI</h3>
              <p>Modern transparent elements with background blur effects to give that premium look.</p>
            </div>

            <div className="card">
              <div className="card-icon">📱</div>
              <h3>Fully Responsive</h3>
              <p>Looks great on desktop monitors as well as mobile screens. Try resizing!</p>
            </div>
          </div>
          
          {/* Extra space just to show the scrolling effect clearly */}
          <div style={{ height: '50vh' }}></div>
          
        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
