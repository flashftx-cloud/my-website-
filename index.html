<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Tournament</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: #111;
    font-family: 'Montserrat', sans-serif;
}

/* FULL SCREEN */
.ui-card {
    width: 100%;
    height: 100vh;
    display: flex;
}

/* BALANCED LAYOUT */
.panel-left {
    width: 55%;
    padding: 5rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: #181818;
    color: #fff;
}

.panel-right {
    width: 45%;
    background: url('https://i.pinimg.com/736x/21/2e/39/212e3914949df7413645318357753e19.jpg') center/cover no-repeat;
}

/* LOGO */
.logo {
    font-size: 1.2rem;
    letter-spacing: 3px;
}

/* HERO */
.hero h1 {
    font-size: 2.5rem;
    letter-spacing: 0.5em;
}

.subtitle {
    color: #c45b41;
    margin-top: 10px;
}

/* INFO */
.info-box {
    margin-top: 20px;
    font-size: 13px;
}

.info-box h4 {
    margin-bottom: 8px;
}

.info-box ol {
    padding-left: 15px;
    color: #aaa;
}

/* BUTTON */
.register-btn {
    padding: 14px;
    background: #c45b41;
    color: #fff;
    border: none;
    cursor: pointer;
}

/* OVERLAY */
#registerOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* GLASS FORM */
.register-box {
    width: 350px;
    padding: 40px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    text-align: center;
}

.register-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 25px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
}

.register-box button {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg, #ff7e5f, #feb47b);
    color: white;
    cursor: pointer;
}

.back-btn {
    margin-top: 10px;
    background: transparent;
    border: 1px solid #fff;
}
</style>
</head>

<body>

<main class="ui-card">

    <!-- LEFT SIDE -->
    <div class="panel-left">

        <div>
            <div class="logo">FLASH FTX GAMING TOURNAMENT</div>

            <div class="hero">
                <h1>LETS GO FUN</h1>
                <div class="subtitle">STARTING TODAY 10PM</div>
            </div>

            <!-- BGMI -->
            <div class="info-box">
                <h4>BGMI / ERANGEL</h4>
                <ol>
                    <li>Total Prize 10K</li>
                    <li>5 Matches</li>
                    <li>100 Players</li>
                    <li>Kill + Position</li>
                </ol>
            </div>

            <!-- FREE FIRE -->
            <div class="info-box">
                <h4>FREE FIRE</h4>
                <ol>
                    <li>Total Prize 10K</li>
                    <li>5 Room Matches</li>
                    <li>4v4 Only</li>
                </ol>
            </div>
        </div>

        <button class="register-btn" onclick="openForm()">Register Now</button>

    </div>

    <!-- RIGHT SIDE -->
    <div class="panel-right"></div>

</main>

<!-- OVERLAY -->
<div id="registerOverlay">
  <form class="register-box" id="registerForm">
    <h2>Register</h2>
    <p>Join Tournament Now</p>

    <input type="text" placeholder="Your Name" required>
    <input type="text" placeholder="Game ID" required>
    <input type="tel" placeholder="Contact Number" required>

    <button type="submit">Submit</button>
    <button type="button" class="back-btn" onclick="closeForm()">Back</button>
  </form>
</div>

<script>
function openForm(){
    document.getElementById("registerOverlay").style.display = "flex";
}

function closeForm(){
    document.getElementById("registerOverlay").style.display = "none";
}

document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Registration Successful ✅");
    closeForm();
});
</script>

</body>
</html>
