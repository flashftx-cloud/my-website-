<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLASH FTX Gaming</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0f0f0f;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 40px 20px;
}

.logo {
    font-size: 14px;
    letter-spacing: 4px;
    margin-bottom: 20px;
    opacity: 0.8;
}

.hero h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 6px;
    line-height: 1.2;
}

.subtitle {
    color: #c45b41;
    margin-top: 15px;
    font-size: 18px;
}

.section {
    margin-top: 40px;
}

.section h3 {
    margin-bottom: 10px;
    font-weight: 700;
}

.section ol {
    padding-left: 20px;
    color: #aaa;
    line-height: 1.8;
}

.register-btn {
    margin-top: 40px;
    width: 100%;
    padding: 15px;
    background: #c45b41;
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
}

#registerOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
}

.register-box {
    width: 320px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    text-align: center;
}

.register-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
}

.register-box button {
    width: 100%;
    padding: 12px;
    border-radius: 20px;
    border: none;
    background: #ff7e5f;
    color: #fff;
}

.back-btn {
    margin-top: 10px;
    background: transparent;
    border: 1px solid #fff;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo"><h1>FLASH FTX GAMING TOURNAMENT</h1></div>

    <div class="hero">
        <h2>LETS GO<br>FOR FUN</h2>
        <div class="subtitle">STARTING TODAY 10PM</div>
    </div>

    <div class="section">
        <h3>BGMI / ERANGEL</h3>
        <ol>
            <li>Total Prize 10K</li>
            <li>5 Matches</li>
            <li>100 Players</li>
            <li>Kill + Position</li>
        </ol>
    </div>

    <div class="section">
        <h3>FREE FIRE</h3>
        <ol>
            <li>Total Prize 10K</li>
            <li>5 Room Matches</li>
            <li>4v4 Only</li>
        </ol>
    </div>

    <button class="register-btn" onclick="openForm()">Register Now</button>

</div>

<!-- OVERLAY -->
<div id="registerOverlay">
  <form class="register-box" id="registerForm">
    <h2>Register</h2>
    <p>JOIN TOURNAMENT NOW</p>
    <br>

    <!-- ✅ ID added -->
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="gameId" placeholder="Game ID" required>
    <input type="tel" id="contact" placeholder="Contact Number" required>

    <button type="submit">Submit</button>
    <button type="button" class="back-btn" onclick="closeForm()">Back</button>
  </form>
</div>
</body>
</html>
