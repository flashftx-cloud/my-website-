<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Tournament</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #111;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
}

/* MAIN LAYOUT */
.container {
    display: flex;
    flex-wrap: wrap;
    min-height: 100vh;
}

/* LEFT CONTENT */
.left {
    flex: 1;
    padding: 3rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* RIGHT IMAGE */
.right {
    flex: 1;
    background: url('https://i.pinimg.com/736x/21/2e/39/212e3914949df7413645318357753e19.jpg') center/cover no-repeat;
    min-height: 300px;
}

/* TEXT */
.logo {
    font-size: 1.2rem;
    letter-spacing: 2px;
}

.hero h1 {
    font-size: 2.5rem;
    letter-spacing: 5px;
    margin-top: 20px;
}

.subtitle {
    color: #c45b41;
    margin-top: 10px;
}

/* INFO */
.info-box {
    margin-top: 25px;
}

.info-box h4 {
    margin-bottom: 8px;
}

.info-box ol {
    padding-left: 20px;
    color: #aaa;
}

/* BUTTON */
.register-btn {
    margin-top: 30px;
    padding: 14px;
    background: #c45b41;
    border: none;
    color: #fff;
    cursor: pointer;
    width: 200px;
}

/* OVERLAY */
#registerOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
}

/* FORM */
.register-box {
    width: 320px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    text-align: center;
}

.register-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
}

.register-box button {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: none;
    background: #ff7e5f;
    color: #fff;
}

.back-btn {
    margin-top: 8px;
    background: transparent;
    border: 1px solid #fff;
}

/* MOBILE */
@media(max-width:768px){
    .container {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">

        <div>
            <div class="logo">FLASH FTX GAMING TOURNAMENT</div>

            <div class="hero">
                <h1>LETS GO FUN</h1>
                <div class="subtitle">STARTING TODAY 10PM</div>
            </div>

            <div class="info-box">
                <h4>BGMI / ERANGEL</h4>
                <ol>
                    <li>Total Prize 10K</li>
                    <li>5 Matches</li>
                    <li>100 Players</li>
                    <li>Kill + Position</li>
                </ol>
            </div>

            <div class="info-box">
                <h4>FREE FIRE</h4>
                <ol>
                    <li>Total Prize 10K</li>
                    <li>5 Room Matches</li>
                    <li>4v4 Only</li>
                </ol>
            </div>
        </div>

        <button class="register-btn" onclick="openForm()">Register Now</button>

    </div>

    <!-- RIGHT -->
    <div class="right"></div>

</div>

<!-- OVERLAY -->
<div id="registerOverlay">
  <form class="register-box" id="registerForm">
    <h2>Register</h2>

    <input type="text" placeholder="Your Name" required>
    <input type="text" placeholder="Game ID" required>
    <input type="tel" placeholder="Contact Number" required>

    <button type="submit">Submit</button>
    <button type="button" class="back-btn" onclick="closeForm()">Back</button>
  </form>
</div>

<script>
function openForm(){
    document.getElementById("registerOverlay").style.display = "flex";
}

function closeForm(){
    document.getElementById("registerOverlay").style.display = "none";
}

document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Registration Successful ✅");
    closeForm();
});
</script>

</body>
</html>
