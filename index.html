<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Website Example</title>
    <style>
        /* Basic Reset and Styling */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animated-container {
            animation: fadeIn 2s ease-out forwards;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #e2e8f0;
        }

        /* Bounce Animation for Button */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        .cta-button {
            padding: 15px 30px;
            font-size: 1.1rem;
            color: #764ba2;
            background-color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: background-color 0.3s ease;
            animation: bounce 2s infinite; /* Applying the bounce */
        }

        .cta-button:hover {
            background-color: #f0f0f0;
            animation-play-state: paused; /* Pauses bouncing when hovered */
        }
    </style>
</head>
<body>

    <div class="animated-container">
        <h1>Welcome to the Future</h1>
        <p>This entire section faded in, and the button below is bouncing!</p>
        <button class="cta-button">Click Me</button>
    </div>

</body>
</html>
